name: Rust Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  CARGO_TERM_COLOR: always

jobs:
  public-checks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: rustfmt, clippy

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run formatting check
      run: cargo fmt --all -- --check

    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Run public data loader smoke test
      run: cargo test --lib public_fixture_test::public_fixture_loads_without_private_game_content -- --exact --test-threads=1

    - name: Build release
      run: cargo build --release --bin murim_server

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: murim_server
        path: target/release/murim_server
        if-no-files-found: error

  private-data-tests:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Checkout private game data
      env:
        DATA_DEPLOY_KEY: ${{ secrets.DATA_DEPLOY_KEY }}
      run: |
        install -d -m 700 ~/.ssh
        printf '%s\n' "$DATA_DEPLOY_KEY" > ~/.ssh/muc_data_key
        chmod 600 ~/.ssh/muc_data_key
        git config submodule.data.url git@github.com:chulbumi/muc-python3-data.git
        GIT_SSH_COMMAND='ssh -i ~/.ssh/muc_data_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new' \
          git submodule update --init --depth 1 data
        ./scripts/init-runtime-data.sh

    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run full private-data test suite
      run: cargo test --verbose
